<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 360" role="img" aria-label="Contact icon">
  <defs>
    <linearGradient id="grad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1dd1ff" />
      <stop offset="100%" stop-color="#5a31ff" />
    </linearGradient>
    <filter id="glow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="12" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>
  <rect width="640" height="360" rx="40" fill="#081620" />
  <path d="M150 90h340v180H150z" fill="url(#grad)" filter="url(#glow)" opacity="0.92" />
  <path d="M150 90l170 120 170-120" fill="none" stroke="#0b0f14" stroke-width="18" />
  <circle cx="320" cy="225" r="12" fill="#0b0f14" />
  <text x="320" y="330" text-anchor="middle" fill="#ffffffaa" font-family="Inter, system-ui, sans-serif" font-size="36">Contact</text>
</svg>
