<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 360" role="img" aria-label="TV and low voltage icon">
  <defs>
    <linearGradient id="grad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#7b5cff" />
      <stop offset="100%" stop-color="#31d3ff" />
    </linearGradient>
    <filter id="glow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="12" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>
  <rect width="640" height="360" rx="40" fill="#081a2d" />
  <rect x="120" y="80" width="400" height="220" rx="28" fill="url(#grad)" filter="url(#glow)" />
  <path d="M180 140h280v120H180z" fill="#0b0f14" opacity="0.65" />
  <path d="M220 200h200" stroke="#ffffffaa" stroke-width="10" stroke-linecap="round" />
  <circle cx="340" cy="270" r="12" fill="#ffffffaa" />
  <text x="320" y="330" text-anchor="middle" fill="#ffffffaa" font-family="Inter, system-ui, sans-serif" font-size="36">TV / Low Voltage</text>
</svg>
